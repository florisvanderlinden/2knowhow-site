backend:
  name: git-gateway
  branch: main

media_folder: "src/img"
public_folder: "/img"

collections:
  - name: "posts"
    label: "Artikelen"
    folder: "src/inzichten/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Beschrijving", name: "description", widget: "text" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Auteur", name: "author", widget: "string", default: "2KNOWHOW" }
      - { label: "Tags", name: "tags", widget: "hidden", default: "post" }
      - { label: "Inhoud", name: "body", widget: "markdown" }
